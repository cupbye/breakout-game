<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>벽돌깨기</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151f;
      --panel: #182230;
      --ink: #f5f7fb;
      --muted: #a8b3c7;
      --line: rgba(255, 255, 255, 0.14);
      --accent: #48d6a3;
      --warn: #ffca5f;
      --danger: #ff6b7a;
      --blue: #5cb6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 10%, rgba(72, 214, 163, 0.18), transparent 28rem),
        linear-gradient(135deg, #10151f 0%, #1f2430 46%, #111923 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    main {
      width: min(100vw, 980px);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      padding: 18px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1;
      letter-spacing: 0;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .stat {
      min-width: 86px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 34, 48, 0.82);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 18px;
    }

    .game-wrap {
      position: relative;
      width: 100%;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    canvas {
      width: min(100%, calc((100vh - 150px) * 1.42));
      max-height: calc(100vh - 150px);
      aspect-ratio: 16 / 11;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c1119;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.36);
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      padding: 24px;
    }

    .message {
      width: min(460px, 92%);
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 21, 31, 0.88);
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.38);
    }

    .message h2 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: 0;
    }

    .message p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      word-break: keep-all;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    button {
      min-width: 96px;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #223044;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: rgba(72, 214, 163, 0.72);
      outline: none;
    }

    button.primary {
      background: var(--accent);
      color: #062116;
      border-color: transparent;
    }

    @media (max-width: 680px) {
      main {
        padding: 12px;
        gap: 10px;
      }

      header,
      footer {
        align-items: stretch;
        flex-direction: column;
      }

      .stats,
      .controls {
        justify-content: stretch;
      }

      .stat,
      button {
        flex: 1;
      }

      canvas {
        width: 100%;
        max-height: calc(100vh - 230px);
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>벽돌깨기</h1>
      <div class="stats" aria-label="게임 상태">
        <div class="stat"><span>점수</span><strong id="score">0</strong></div>
        <div class="stat"><span>생명</span><strong id="lives">3</strong></div>
        <div class="stat"><span>레벨</span><strong id="level">1</strong></div>
      </div>
    </header>

    <section class="game-wrap" aria-label="벽돌깨기 게임판">
      <canvas id="game" width="960" height="660"></canvas>
      <div class="overlay" id="overlay">
        <div class="message">
          <h2 id="messageTitle">시작 준비</h2>
          <p id="messageText">스페이스 또는 시작 버튼을 누르세요. 마우스와 터치로도 막대를 움직일 수 있어요.</p>
        </div>
      </div>
    </section>

    <footer>
      <div>← → 이동 · 스페이스 시작/일시정지 · R 다시 시작</div>
      <div class="controls">
        <button class="primary" id="startButton">시작</button>
        <button id="restartButton">다시 시작</button>
      </div>
    </footer>
  </main>

  <script>
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.querySelector("#score");
    const livesEl = document.querySelector("#lives");
    const levelEl = document.querySelector("#level");
    const overlay = document.querySelector("#overlay");
    const messageTitle = document.querySelector("#messageTitle");
    const messageText = document.querySelector("#messageText");
    const startButton = document.querySelector("#startButton");
    const restartButton = document.querySelector("#restartButton");

    const W = canvas.width;
    const H = canvas.height;
    const keys = new Set();
    const colors = ["#ff6b7a", "#ffca5f", "#48d6a3", "#5cb6ff", "#b890ff"];
    const SPEED_UP_PER_BRICK = 1.045;

    let score;
    let lives;
    let level;
    let status;
    let paddle;
    let ball;
    let bricks;
    let lastTime = 0;

    function resetGame() {
      score = 0;
      lives = 3;
      level = 1;
      status = "ready";
      makePaddle();
      makeBall();
      makeBricks();
      updateHud();
      showMessage("시작 준비", "스페이스 또는 시작 버튼을 누르세요. 마우스와 터치로도 막대를 움직일 수 있어요.");
      draw();
    }

    function makePaddle() {
      paddle = {
        w: Math.max(96, 150 - level * 8),
        h: 18,
        x: W / 2 - 75,
        y: H - 58,
        speed: 620
      };
    }

    function makeBall() {
      const speed = 360 + level * 34;
      ball = {
        r: 10,
        x: W / 2,
        y: paddle.y - 13,
        vx: speed * (Math.random() > 0.5 ? 0.52 : -0.52),
        vy: -speed,
        speed
      };
    }

    function makeBricks() {
      const rows = Math.min(8, 4 + level);
      const cols = 10;
      const gap = 10;
      const top = 82;
      const side = 48;
      const brickW = (W - side * 2 - gap * (cols - 1)) / cols;
      const brickH = 28;

      bricks = [];
      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const tough = row < Math.floor(level / 2) ? 2 : 1;
          bricks.push({
            x: side + col * (brickW + gap),
            y: top + row * (brickH + gap),
            w: brickW,
            h: brickH,
            hp: tough,
            maxHp: tough,
            color: colors[row % colors.length]
          });
        }
      }
    }

    function updateHud() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      levelEl.textContent = level;
    }

    function showMessage(title, text) {
      messageTitle.textContent = title;
      messageText.textContent = text;
      overlay.style.display = "grid";
    }

    function hideMessage() {
      overlay.style.display = "none";
    }

    function launch() {
      if (status === "playing") {
        status = "paused";
        startButton.textContent = "계속";
        showMessage("일시정지", "스페이스 또는 계속 버튼을 누르면 이어서 플레이합니다.");
        return;
      }

      if (status === "won" || status === "lost") {
        resetGame();
      }

      status = "playing";
      startButton.textContent = "일시정지";
      hideMessage();
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function nextLevel() {
      level += 1;
      makePaddle();
      makeBall();
      makeBricks();
      updateHud();
      status = "ready";
      startButton.textContent = "시작";
      showMessage(`레벨 ${level}`, "좋아요. 속도가 조금 빨라졌습니다. 스페이스를 누르면 다음 라운드가 시작됩니다.");
    }

    function loseLife() {
      lives -= 1;
      updateHud();
      if (lives <= 0) {
        status = "lost";
        startButton.textContent = "시작";
        showMessage("게임 오버", `최종 점수는 ${score}점입니다. R 또는 다시 시작 버튼으로 새 게임을 시작하세요.`);
        return;
      }

      status = "ready";
      makeBall();
      startButton.textContent = "시작";
      showMessage("공을 놓쳤어요", `남은 생명 ${lives}개. 스페이스를 누르면 다시 시작합니다.`);
    }

    function loop(now) {
      if (status !== "playing") return;
      const dt = Math.min(0.025, (now - lastTime) / 1000);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      movePaddle(dt);

      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      if (ball.x - ball.r <= 0 || ball.x + ball.r >= W) {
        ball.vx *= -1;
        ball.x = Math.max(ball.r, Math.min(W - ball.r, ball.x));
      }

      if (ball.y - ball.r <= 0) {
        ball.vy *= -1;
        ball.y = ball.r;
      }

      if (ball.y - ball.r > H) {
        loseLife();
        draw();
        return;
      }

      collidePaddle();
      collideBricks();

      if (bricks.every((brick) => brick.hp <= 0)) {
        nextLevel();
        draw();
      }
    }

    function movePaddle(dt) {
      if (keys.has("ArrowLeft") || keys.has("a")) paddle.x -= paddle.speed * dt;
      if (keys.has("ArrowRight") || keys.has("d")) paddle.x += paddle.speed * dt;
      paddle.x = Math.max(18, Math.min(W - paddle.w - 18, paddle.x));

      if (status === "ready") {
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - ball.r - 3;
      }
    }

    function collidePaddle() {
      const withinX = ball.x + ball.r > paddle.x && ball.x - ball.r < paddle.x + paddle.w;
      const withinY = ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h;

      if (withinX && withinY && ball.vy > 0) {
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const angle = hit * Math.PI * 0.38;
        ball.vx = Math.sin(angle) * ball.speed;
        ball.vy = -Math.cos(angle) * ball.speed;
        ball.y = paddle.y - ball.r - 1;
      }
    }

    function collideBricks() {
      for (const brick of bricks) {
        if (brick.hp <= 0) continue;

        const closestX = clamp(ball.x, brick.x, brick.x + brick.w);
        const closestY = clamp(ball.y, brick.y, brick.y + brick.h);
        const dx = ball.x - closestX;
        const dy = ball.y - closestY;

        if (dx * dx + dy * dy <= ball.r * ball.r) {
          brick.hp -= 1;
          const destroyed = brick.hp <= 0;
          score += destroyed ? 100 * brick.maxHp : 35;
          updateHud();

          if (Math.abs(dx) > Math.abs(dy)) {
            ball.vx *= -1;
          } else {
            ball.vy *= -1;
          }

          if (destroyed) speedUpBall();
          return;
        }
      }
    }

    function speedUpBall() {
      const maxSpeed = 680 + level * 46;
      const nextSpeed = Math.min(maxSpeed, ball.speed * SPEED_UP_PER_BRICK);
      const currentLength = Math.hypot(ball.vx, ball.vy) || ball.speed;
      ball.speed = nextSpeed;
      ball.vx = ball.vx / currentLength * nextSpeed;
      ball.vy = ball.vy / currentLength * nextSpeed;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawCourt();
      drawBricks();
      drawPaddle();
      drawBall();
    }

    function drawCourt() {
      const gradient = ctx.createLinearGradient(0, 0, W, H);
      gradient.addColorStop(0, "#0d131d");
      gradient.addColorStop(1, "#151d29");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.06)";
      ctx.lineWidth = 1;
      for (let x = 40; x < W; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
    }

    function drawBricks() {
      for (const brick of bricks) {
        if (brick.hp <= 0) continue;
        ctx.fillStyle = brick.hp === 1 ? brick.color : "#f2f4f8";
        roundRect(brick.x, brick.y, brick.w, brick.h, 7);
        ctx.fill();

        ctx.fillStyle = "rgba(255, 255, 255, 0.22)";
        roundRect(brick.x + 6, brick.y + 5, brick.w - 12, 6, 4);
        ctx.fill();
      }
    }

    function drawPaddle() {
      ctx.fillStyle = "#edf7ff";
      roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 9);
      ctx.fill();

      ctx.fillStyle = "#48d6a3";
      roundRect(paddle.x + paddle.w * 0.32, paddle.y + 4, paddle.w * 0.36, 5, 3);
      ctx.fill();
    }

    function drawBall() {
      const glow = ctx.createRadialGradient(ball.x - 3, ball.y - 4, 2, ball.x, ball.y, ball.r * 2.8);
      glow.addColorStop(0, "#ffffff");
      glow.addColorStop(0.45, "#5cb6ff");
      glow.addColorStop(1, "rgba(92, 182, 255, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r * 2.8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function setPaddleFromPointer(event) {
      const rect = canvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width * W;
      paddle.x = clamp(x - paddle.w / 2, 18, W - paddle.w - 18);
      if (status === "ready") {
        ball.x = paddle.x + paddle.w / 2;
        draw();
      }
    }

    window.addEventListener("keydown", (event) => {
      if (["ArrowLeft", "ArrowRight", " ", "Spacebar"].includes(event.key)) event.preventDefault();
      keys.add(event.key);

      if (event.key === " " || event.key === "Spacebar") launch();
      if (event.key.toLowerCase() === "r") resetGame();
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.key);
    });

    canvas.addEventListener("pointermove", setPaddleFromPointer);
    canvas.addEventListener("pointerdown", (event) => {
      setPaddleFromPointer(event);
      if (status !== "playing") launch();
    });

    startButton.addEventListener("click", launch);
    restartButton.addEventListener("click", resetGame);
    resetGame();
  </script>
</body>
</html>
